<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل البث</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body, html { margin: 0; padding: 0; background: #000; height: 100%; overflow: hidden; }
        #video { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>
    <video id="video" controls autoplay playsinline></video>

    <script>
        // استخراج الرابط من الرابط الحالي مثل: play.html?url=...
        const urlParams = new URLSearchParams(window.location.search);
        const streamUrl = urlParams.get('url');
        const video = document.getElementById('video');

        if (!streamUrl) {
            alert("الرجاء إضافة رابط البث في الرابط مثل: ?url=رابط_البث");
        } else if (Hls.isSupported()) {
            const hls = new Hls({
                // محاولة إرسال الـ Headers اللازمة
                xhrSetup: function(xhr, url) {
                    xhr.setRequestHeader('Referer', 'https://cup.shootwithyalla.com/');
                    xhr.setRequestHeader('Origin', 'https://cup.shootwithyalla.com');
                }
            });

            hls.loadSource(streamUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play().catch(e => console.log("التشغيل التلقائي يحتاج تفاعل المستخدم"));
            });
        }
        
        // إجبار المتصفح على عرض الفيديو بملء الشاشة عند الضغط عليه
        video.addEventListener('click', () => {
            if (video.requestFullscreen) {
                video.requestFullscreen();
            }
        });
    </script>
</body>
</html>
