<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل البث</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body, html { margin: 0; padding: 0; background: #000; height: 100%; overflow: hidden; }
        #video { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>
    <video id="video" controls autoplay playsinline></video>

    <script>
        // استخراج جميع المتغيرات من الرابط
        const urlParams = new URLSearchParams(window.location.search);
        
        // جلب رابط البث (سواء كتبته url= أو l=)
        const streamUrl = urlParams.get('url') || urlParams.get('l');
        const video = document.getElementById('video');

        // جلب باقي الهيدرز المكتوبة في الرابط (وتخطي رابط البث)
        const dynamicHeaders = {};
        urlParams.forEach((value, key) => {
            if (key !== 'url' && key !== 'l') {
                dynamicHeaders[key] = value;
            }
        });

        if (!streamUrl) {
            alert("لم يتم العثور على رابط البث في شريط العنوان");
        } else if (Hls.isSupported()) {
            const hls = new Hls({
                xhrSetup: function(xhr, url) {
                    // المرور على كل الهيدرز المستخرجة من الرابط وإضافتها
                    for (const [headerName, headerValue] of Object.entries(dynamicHeaders)) {
                        try {
                            xhr.setRequestHeader(headerName, headerValue);
                        } catch (e) {
                            console.warn(`المتصفح منع تعيين الهيدر: ${headerName}`);
                        }
                    }
                }
            });

            hls.loadSource(streamUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play().catch(e => console.log("التشغيل التلقائي يحتاج تفاعل المستخدم"));
            });
            
            // معالجة الأخطاء إذا فشل السيرفر في التشغيل
            hls.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) {
                    console.error("حدث خطأ قاتل في المشغل:", data.type);
                }
            });
        }
        
        // إجبار المتصفح على عرض الفيديو بملء الشاشة عند النقر
        video.addEventListener('click', () => {
            if (video.requestFullscreen) {
                video.requestFullscreen();
            }
        });
    </script>
</body>
</html>
