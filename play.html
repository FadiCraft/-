<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل البث</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body, html { margin: 0; padding: 0; background: #000; height: 100%; overflow: hidden; }
        #video { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>
    <video id="video" controls autoplay playsinline></video>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const streamUrl = urlParams.get('l');
        const video = document.getElementById('video');

        if (!streamUrl) {
            console.error("الرابط غير موجود");
        } else if (Hls.isSupported()) {
            const hls = new Hls({
                xhrSetup: function(xhr, url) {
                    // إضافة الرؤوس المتاحة برمجياً
                    xhr.setRequestHeader('DNT', '1');
                    xhr.setRequestHeader('sec-ch-ua', '"Not;A=Brand";v="8", "Chromium";v="150", "Google Chrome";v="150"');
                    xhr.setRequestHeader('sec-ch-ua-mobile', '?0');
                    xhr.setRequestHeader('sec-ch-ua-platform', '"Windows"');
                    xhr.setRequestHeader('Accept', '*/*');
                    
                    // ملاحظة: Referer و Origin و User-Agent يتم التحكم بها من المتصفح 
                    // ولا يمكن تجاوزها عبر كود العميل (Client-side)
                }
            });

            hls.loadSource(streamUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play().catch(e => console.log("التشغيل التلقائي يحتاج تفاعل المستخدم"));
            });
        }
        
        video.addEventListener('click', () => {
            if (video.requestFullscreen) {
                video.requestFullscreen();
            }
        });
    </script>
</body>
</html>
